<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="logo2.png" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
    <title>Aumento Salarial</title>
</head>
<body>
    <header>
        <div class="header-top">
                <img src="logo2.png" alt="logo" class="logo">
                <h1>Calculadora de Aumento Salarial</h1>
            </div>
        <div class="top-bar">
            <button type="button" id="backButton">← Voltar</button>
            <span id="dateTime"></span>
        </div>
    </header>
    <main>
        <form id="salaryForm">
            <label for="salario-atual">Salário Atual:</label>
            <input type="number" id="salario-atual" name="salario-atual" required>
            
            <button type="button" id="calcular-aumento">Calcular Aumento</button>
        </form>
        <div id="resultado-aumento"></div>
    </main>
    <footer>
        <p>&copy; 2026 Calculadora de Aumento Salarial</p>
    </footer>
<script src="script.js"></script>
</body>
</html>
