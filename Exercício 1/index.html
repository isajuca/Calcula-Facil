<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="logo1.png" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
    <title>Horas Extras</title>
</head>
<body>
    <header>
        <div class="header-top">
            <img src="logo1.png" alt="logo" class="logo">
            <h1>Calculadora de Horas Extras</h1>
            </div>
        <div class="top-bar">
            <button type="button" id="backButton">← Voltar</button>
            <span id="dateTime"></span>
        </div>
    </header>
    <main>
        <form id="extraHoursForm">
            <label for="salario">Salário Bruto:</label>
            <input type="number" id="salario" name="salario" required>

            <label for="horas-extras">Horas Extras Trabalhadas (seg-sex):</label>
            <input type="number" id="horas-extras" name="horas-extras" required>

            <label for="horas-extras-fds">Horas Extras Trabalhadas (finais de semana):</label>
            <input type="number" id="horas-extras-fds" name="horas-extras-fds" required>

            <button type="button" id="calcular">Calcular</button>
        </form>

        <div id="resultado"></div>

    </main>
    <footer>
        <p>&copy; 2026 Calculadora de Horas Extras</p>
    </footer>
    <script src="script.js"></script> 
</body>
</html>
