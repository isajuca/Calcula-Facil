<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="logo3.png" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
    <title>Transporte de Colaboradores</title>
</head>
<body>
    <header>
        <div class="header-top">
                <img src="logo3.png" alt="logo" class="logo">
                <h1>Transporte de Colaboradores</h1>
            </div>
        <div class="top-bar">
            <button type="button" id="backButton">← Voltar</button>
            <span id="dateTime"></span>
        </div>
    </header>
    <main>
        <form id="transporteForm">
            <label for="quantidade-funcionarios">Quantidade de Funcionários:</label>
            <input type="number" id="quantidade-funcionarios" name="quantidade-funcionarios" required>
            <label for="quantidade-dias">Quantidade de Dias:</label>
            <input type="number" id="quantidade-dias" name="quantidade-dias" required>

            <button type="button" id="calculate">Calcular Frete</button>
        </form>
        <div id="result"></div>
    </main>
    <footer>
        <p>&copy; 2026 Transporte de Colaboradores</p>
    <script src="script.js"></script>
</body>
</html>
